<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USAREUR-AF Staff Duty Roster Generator</title>
<style>
/* ===== FORM PAGE STYLES (Dark Theme) ===== */
:root {
  --navy: #0C2340;
  --gold: #C8971A;
  --dark: #0a1628;
  --card: #111d30;
  --border: #1e3050;
  --text: #d0dae8;
  --font: 'Segoe UI', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body.form-page {
  font-family: var(--font);
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
}
body.dash-page {
  font-family: var(--font);
  background: #f4f6f9;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ---------- FORM HEADER ---------- */
.form-header {
  background: linear-gradient(135deg, var(--navy) 0%, #0f2d4f 100%);
  border-bottom: 3px solid var(--gold);
  text-align: center;
  padding: 28px 16px 22px;
}
.form-header .crest { margin-bottom: 10px; }
.form-header h1 {
  color: var(--gold);
  font-size: 1.35rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.form-header h2 {
  color: #fff;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.form-header .sub {
  color: #8ea4bf;
  font-size: 0.82rem;
  letter-spacing: 1.5px;
}

/* ---------- FORM CARDS ---------- */
.form-container { max-width: 860px; margin: 28px auto; padding: 0 16px 40px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 22px;
  overflow: hidden;
}
.card-hdr {
  background: var(--navy);
  border-bottom: 2px solid var(--gold);
  padding: 10px 18px;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-body { padding: 18px; }

/* ---------- FORM ELEMENTS ---------- */
label.flabel {
  display: block;
  color: var(--gold);
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}
input[type="date"], input[type="text"], input[type="number"] {
  background: #0d1a2d;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 9px 12px;
  font-size: 0.95rem;
  font-family: var(--font);
  width: 100%;
}
input:focus { outline: none; border-color: var(--gold); }
.row2 { display: flex; gap: 16px; }
.row2 > div { flex: 1; }

/* Directorate table */
.dir-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.dir-table th {
  background: var(--navy);
  color: var(--gold);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 10px;
  text-align: left;
}
.dir-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
.dir-table input[type="text"], .dir-table input[type="number"] {
  padding: 7px 10px;
  font-size: 0.9rem;
}
.dir-table .remove-btn {
  background: #5a1a1a;
  color: #e87474;
  border: 1px solid #7a2a2a;
  border-radius: 5px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 0.82rem;
}
.dir-table .remove-btn:hover { background: #7a2a2a; }

.btn-row { display: flex; gap: 10px; margin-top: 12px; }
.btn-add {
  background: #122a45;
  color: var(--gold);
  border: 1px solid var(--gold);
  border-radius: 6px;
  padding: 8px 18px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 600;
}
.btn-add:hover { background: #1a3a5c; }

/* Toggle */
.toggle-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; font-size: 0.9rem;
}
.toggle-row input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: var(--gold);
}

/* Submit */
.btn-generate {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--gold), #e0a820);
  color: var(--navy);
  border: none;
  border-radius: 8px;
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-generate:hover { filter: brightness(1.08); transform: translateY(-1px); }

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.92);
  z-index: 9999;
  justify-content: center; align-items: center;
  flex-direction: column;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 52px; height: 52px;
  border: 5px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay .msg { color: var(--gold); font-size: 1.1rem; font-weight: 600; }

/* ===== DASHBOARD STYLES (Light Theme) ===== */
.unclas-banner {
  background: #16a34a;
  color: #fff;
  text-align: center;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 3px;
  padding: 5px 0;
}

/* Dashboard header — flex layout with crest left, text center, meta right */
.dash-header {
  background: linear-gradient(135deg, var(--navy) 0%, #0f2d4f 100%);
  border-bottom: 3px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px 18px;
  color: #fff;
}
.dash-header .header-left {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
}
.dash-header .header-center {
  flex: 1;
  text-align: center;
}
.dash-header .header-right {
  flex: 0 0 auto;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.dash-header h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 2px; }
.dash-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
.dash-header .sub { color: #8ea4bf; font-size: 0.82rem; }
.header-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--navy);
  font-weight: 800;
  font-size: 0.72rem;
  letter-spacing: 2px;
  padding: 3px 12px;
  border-radius: 3px;
  text-transform: uppercase;
}
.header-meta-line {
  color: #8ea4bf;
  font-size: 0.78rem;
  letter-spacing: 0.5px;
}

.sticky-nav {
  position: sticky; top: 0; z-index: 500;
  background: var(--navy);
  border-bottom: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px;
  color: #8ea4bf;
  font-size: 0.82rem;
}
.sticky-nav a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.88rem;
}
.sticky-nav a:hover { text-decoration: underline; }
.sticky-nav .nav-right {
  display: flex;
  align-items: center;
  gap: 14px;
}
.btn-excel {
  background: var(--gold);
  color: var(--navy);
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.btn-excel:hover { filter: brightness(1.1); }
.nav-tabs { display: flex; gap: 0; }
.nav-tab {
  background: transparent;
  color: #8ea4bf;
  font-weight: 600;
  padding: 8px 18px;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
}
.nav-tab:hover { color: #fff; }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.dash-container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

/* Section headers */
.section-hdr {
  border-left: 4px solid var(--navy);
  border-bottom: 2px solid var(--gold);
  padding: 10px 14px;
  margin-bottom: 18px;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-hdr .section-badge {
  display: inline-block;
  background: var(--navy);
  color: var(--gold);
  font-weight: 800;
  font-size: 0.72rem;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 3px;
  text-transform: uppercase;
}
.section-hdr .section-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 0.5px;
}

/* Stat cards */
.stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 140px;
  background: #fff;
  border: 1px solid #dde3ea;
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.stat-card .val { font-size: 2rem; font-weight: 800; color: var(--navy); }
.stat-card .lbl { font-size: 0.78rem; color: #6b7a8d; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Legend */
.legend-box {
  background: #fff;
  border: 1px solid #dde3ea;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 24px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
.legend-swatch { width: 16px; height: 16px; border-radius: 3px; }
.legend-sep { width: 1px; height: 20px; background: #dde3ea; }

/* Dashboard tables */
.dtable-wrap {
  background: #fff;
  border: 1px solid #dde3ea;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.dtable-hdr {
  background: var(--navy);
  color: var(--gold);
  padding: 10px 18px;
  font-weight: 700;
  font-size: 0.92rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.dtable { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.dtable th {
  background: #f0f3f7;
  color: var(--navy);
  font-size: 0.76rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid #dde3ea;
  position: sticky; top: 0;
}
.dtable td {
  padding: 10px 14px;
  border-bottom: 1px solid #eef1f5;
  color: #1e293b;
}
.dtable tr:hover { background: #f8f9fb; }

/* Bar in summary */
.bar-cell { display: flex; align-items: center; gap: 8px; }
.bar-bg { height: 14px; border-radius: 3px; background: #e2e8f0; flex: 1; overflow: hidden; min-width: 100px; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-val { font-weight: 700; min-width: 24px; text-align: right; }

/* Side-by-side */
.side2 { display: flex; gap: 20px; flex-wrap: wrap; }
.side2 > div { flex: 1; min-width: 360px; }

/* Calendar */
.cal-row-weekend { background: #eff6ff !important; }
.cal-row-holiday { background: #fff7ed !important; }
.cal-month-divider { background: var(--navy) !important; }
.cal-month-divider td {
  color: var(--gold) !important;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 12px 14px !important;
  font-size: 0.82rem;
}
/* Calendar date column: monospace, bolder */
.cal-date-cell {
  font-family: 'Courier New', 'IBM Plex Mono', monospace;
  font-weight: 700;
  font-size: 0.88rem;
}
/* Calendar day column: muted uppercase */
.cal-day-cell {
  color: #6b7a8d;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-size: 0.78rem;
  font-weight: 600;
}
.chip {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 4px;
  color: #fff;
  font-size: 0.82rem;
  font-weight: 700;
  min-width: 72px;
  text-align: center;
}
.badge-weekday { background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
.badge-weekend { background: #bfdbfe; color: #1e40af; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
.badge-holiday { background: #fed7aa; color: #9a3412; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }

/* Fairness */
.verdict-banner {
  border-radius: 8px;
  padding: 14px 20px;
  margin-bottom: 14px;
  font-weight: 700;
  font-size: 1rem;
}
.verdict-green { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
.verdict-yellow { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
.verdict-red { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
}
.pill-green { background: #dcfce7; color: #166534; }
.pill-yellow { background: #fef9c3; color: #854d0e; }
.pill-red { background: #fee2e2; color: #991b1b; }
.gini-note { font-size: 0.8rem; color: #6b7a8d; margin-top: 10px; font-style: italic; }

/* Calendar sticky header */
.cal-table-wrap { max-height: none; overflow: visible; }
.cal-table-wrap .dtable th { position: sticky; top: 42px; z-index: 10; }

/* Footer */
.dash-footer {
  background: var(--navy);
  color: var(--gold);
  text-align: center;
  padding: 28px 16px;
  font-size: 0.78rem;
  letter-spacing: 1px;
  line-height: 1.8;
}
.dash-footer .footer-line {
  margin: 0;
}
.dash-footer .footer-title {
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 2px;
}

@media (max-width: 700px) {
  .side2 { flex-direction: column; }
  .stat-row { flex-direction: column; }
  .row2 { flex-direction: column; }
  .dash-header { flex-direction: column; text-align: center; }
  .dash-header .header-right { align-items: center; margin-top: 10px; }
}
</style>
</head>

const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* Global store for Excel export */
let lastResult = null;

/* ============================================================
   HiGHS ILP SOLVER
   ============================================================ */
let highsSolver = null;

async function initHiGHS() {
  if (highsSolver) return highsSolver;
  highsSolver = await Module({
    locateFile: (file) => file
  });
  return highsSolver;
}

function sanitizeName(name) {
  return name.replace(/[^A-Za-z0-9]/g, '_');
}

function buildLPString(dirsSDNCO, dirsRunner, dates, holidaySet) {
  const nDays = dates.length;
  const H_S = dirsSDNCO.reduce((s, d) => s + d.eligible, 0);
  const H_R = dirsRunner.reduce((s, d) => s + d.eligible, 0);

  const hardIndices = [];
  const softIndices = [];
  dates.forEach((ds, i) => {
    if (isHardDay(ds, holidaySet)) hardIndices.push(i);
    else softIndices.push(i);
  });
  const nHard = hardIndices.length;

  // Build month and half-month groupings
  const monthMap = {}; // key: "YYYY_M" -> [dayIndices]
  dates.forEach((ds, i) => {
    const dt = parseDate(ds);
    const key = `${dt.getFullYear()}_${dt.getMonth()}`;
    if (!monthMap[key]) monthMap[key] = [];
    monthMap[key].push(i);
  });

  const halfMonthMap = {}; // key: "YYYY_M_H" -> [dayIndices]
  dates.forEach((ds, i) => {
    const dt = parseDate(ds);
    const half = dt.getDate() <= 15 ? 0 : 1;
    const key = `${dt.getFullYear()}_${dt.getMonth()}_${half}`;
    if (!halfMonthMap[key]) halfMonthMap[key] = [];
    halfMonthMap[key].push(i);
  });

  const MONTHLY_PENALTY = 1.5;
  const SPACING_PENALTY = 0.6;
  const OVERLAP_PENALTY = 3.0;

  const objTerms = [];
  const constraints = [];
  const binaryVars = [];
  const continuousVars = [];
  let cIdx = 0;

  const allDirNames = new Set();
  dirsSDNCO.forEach(d => allDirNames.add(d.name));
  dirsRunner.forEach(d => allDirNames.add(d.name));

  // Helper to process one role
  function addRoleConstraints(dirs, H, rolePrefix) {
    const dirNames = dirs.map(d => sanitizeName(d.name));

    // Create binary vars xR_dir_day
    dirs.forEach((d, di) => {
      const dn = sanitizeName(d.name);
      for (let t = 0; t < nDays; t++) {
        binaryVars.push(`${rolePrefix}_${dn}_${t}`);
      }
    });

    // C1: Coverage — for each day, sum of all dirs = 1
    for (let t = 0; t < nDays; t++) {
      const terms = dirs.map(d => `${rolePrefix}_${sanitizeName(d.name)}_${t}`).join(' + ');
      constraints.push(`c${cIdx++}: ${terms} = 1`);
    }

    // C2: Total quota — floor(quota) <= sum <= ceil(quota)
    dirs.forEach((d, di) => {
      const dn = sanitizeName(d.name);
      const quota = (d.eligible / H) * nDays;
      const lo = Math.floor(quota);
      const hi = Math.ceil(quota);
      const terms = [];
      for (let t = 0; t < nDays; t++) terms.push(`${rolePrefix}_${dn}_${t}`);
      const sumExpr = terms.join(' + ');
      constraints.push(`c${cIdx++}: ${sumExpr} >= ${lo}`);
      constraints.push(`c${cIdx++}: ${sumExpr} <= ${hi}`);
    });

    // C3: Hard-day deviation (soft)
    dirs.forEach((d, di) => {
      const dn = sanitizeName(d.name);
      const hardTarget = (d.eligible / H) * nHard;
      const overVar = `over${rolePrefix}_${dn}`;
      const underVar = `under${rolePrefix}_${dn}`;
      continuousVars.push(overVar);
      continuousVars.push(underVar);
      objTerms.push(overVar);
      objTerms.push(underVar);

      if (hardIndices.length > 0) {
        const hardTerms = hardIndices.map(t => `${rolePrefix}_${dn}_${t}`).join(' + ');
        // sum_hard - hardTarget <= over  =>  sum_hard - over <= hardTarget
        constraints.push(`c${cIdx++}: ${hardTerms} - ${overVar} <= ${hardTarget}`);
        // hardTarget - sum_hard <= under  =>  sum_hard + under >= hardTarget  =>  -sum_hard - under <= -hardTarget
        constraints.push(`c${cIdx++}: - ${hardTerms} - ${underVar} <= ${-hardTarget}`);
      }
    });

    // C4: Cooldown — no consecutive days for same directorate
    dirs.forEach((d, di) => {
      const dn = sanitizeName(d.name);
      for (let t = 0; t < nDays - 1; t++) {
        constraints.push(`c${cIdx++}: ${rolePrefix}_${dn}_${t} + ${rolePrefix}_${dn}_${t + 1} <= 1`);
      }
    });

    // C5: Monthly spread (soft)
    Object.keys(monthMap).forEach(mk => {
      const monthDays = monthMap[mk];
      dirs.forEach((d, di) => {
        const dn = sanitizeName(d.name);
        const monthlyTarget = ((d.eligible / H) * nDays) * (monthDays.length / nDays);
        const moOver = `moOver${rolePrefix}_${dn}_${mk}`;
        const moUnder = `moUnder${rolePrefix}_${dn}_${mk}`;
        continuousVars.push(moOver);
        continuousVars.push(moUnder);
        objTerms.push(`${MONTHLY_PENALTY} ${moOver}`);
        objTerms.push(`${MONTHLY_PENALTY} ${moUnder}`);

        const terms = monthDays.map(t => `${rolePrefix}_${dn}_${t}`).join(' + ');
        constraints.push(`c${cIdx++}: ${terms} - ${moOver} <= ${monthlyTarget}`);
        constraints.push(`c${cIdx++}: - ${terms} - ${moUnder} <= ${-monthlyTarget}`);
      });
    });

    // C5b: Half-month spacing (soft)
    Object.keys(halfMonthMap).forEach(hk => {
      const halfDays = halfMonthMap[hk];
      dirs.forEach((d, di) => {
        const dn = sanitizeName(d.name);
        const halfTarget = ((d.eligible / H) * nDays) * (halfDays.length / nDays);
        const ho = `ho${rolePrefix}_${dn}_${hk}`;
        const hu = `hu${rolePrefix}_${dn}_${hk}`;
        continuousVars.push(ho);
        continuousVars.push(hu);
        objTerms.push(`${SPACING_PENALTY} ${ho}`);
        objTerms.push(`${SPACING_PENALTY} ${hu}`);

        const terms = halfDays.map(t => `${rolePrefix}_${dn}_${t}`).join(' + ');
        constraints.push(`c${cIdx++}: ${terms} - ${ho} <= ${halfTarget}`);
        constraints.push(`c${cIdx++}: - ${terms} - ${hu} <= ${-halfTarget}`);
      });
    });
  }

  addRoleConstraints(dirsSDNCO, H_S, 'xS');
  addRoleConstraints(dirsRunner, H_R, 'xR');

  // C6: Same-day overlap (soft) — penalize same directorate on same day for both roles
  // Only for directorates that appear in both SDNCO and Runner
  const sdncoNames = new Set(dirsSDNCO.map(d => d.name));
  const runnerNames = new Set(dirsRunner.map(d => d.name));
  const commonDirs = [...sdncoNames].filter(n => runnerNames.has(n));

  commonDirs.forEach(name => {
    const dn = sanitizeName(name);
    for (let t = 0; t < nDays; t++) {
      const olapVar = `olap_${dn}_${t}`;
      binaryVars.push(olapVar);
      objTerms.push(`${OVERLAP_PENALTY} ${olapVar}`);
      constraints.push(`c${cIdx++}: xS_${dn}_${t} + xR_${dn}_${t} - ${olapVar} <= 1`);
    }
  });

  // Build LP string
  let lp = 'Minimize\n obj: ';
  lp += objTerms.join(' + ');
  lp += '\nSubject To\n';
  lp += constraints.join('\n') + '\n';

  // Bounds for continuous vars
  lp += 'Bounds\n';
  continuousVars.forEach(v => {
    lp += ` 0 <= ${v}\n`;
  });

  // Binary section
  lp += 'Binary\n';
  lp += ' ' + binaryVars.join(' ') + '\n';

  lp += 'End\n';
  return lp;
}

function extractILPResults(solution, dirsSDNCO, dirsRunner, dates, holidaySet) {
  const nDays = dates.length;
  const nHard = dates.filter(d => isHardDay(d, holidaySet)).length;
  const H_S = dirsSDNCO.reduce((s, d) => s + d.eligible, 0);
  const H_R = dirsRunner.reduce((s, d) => s + d.eligible, 0);

  function extractRole(dirs, H, rolePrefix) {
    const assignments = {};
    const stats = dirs.map(d => {
      const share = d.eligible / H;
      return {
        name: d.name,
        eligible: d.eligible,
        totalTarget: share * nDays,
        hardTarget: share * nHard,
        remainQuota: 0,
        remainHard: 0,
        assignedTotal: 0,
        assignedHard: 0,
        assignedSoft: 0,
      };
    });

    dates.forEach((ds, t) => {
      for (let di = 0; di < dirs.length; di++) {
        const dn = sanitizeName(dirs[di].name);
        const varName = `${rolePrefix}_${dn}_${t}`;
        const val = solution.Columns[varName]?.Primal || 0;
        if (val > 0.5) {
          assignments[ds] = dirs[di].name;
          stats[di].assignedTotal++;
          if (isHardDay(ds, holidaySet)) {
            stats[di].assignedHard++;
          } else {
            stats[di].assignedSoft++;
          }
          break;
        }
      }
    });

    return { assignments, stats };
  }

  return {
    sdnco: extractRole(dirsSDNCO, H_S, 'xS'),
    runner: extractRole(dirsRunner, H_R, 'xR'),
  };
}

async function solveILP(dirsSDNCO, dirsRunner, dates, holidaySet) {
  try {
    const highs = await initHiGHS();
    const lpString = buildLPString(dirsSDNCO, dirsRunner, dates, holidaySet);
    console.log('LP problem size:', lpString.length, 'chars');
    const solution = highs.solve(lpString, { time_limit: 120 });
    console.log('HiGHS status:', solution.Status);

    if (solution.Status === 'Optimal') {
      solverMethod = 'ILP Optimal';
      return extractILPResults(solution, dirsSDNCO, dirsRunner, dates, holidaySet);
    } else {
      console.warn('HiGHS returned non-optimal status:', solution.Status, '— falling back to greedy');
      solverMethod = 'Greedy Fallback';
      return null;
    }
  } catch (e) {
    console.error('HiGHS failed:', e, '— falling back to greedy');
    solverMethod = 'Greedy Fallback';
    return null;
  }
}

/* ============================================================
   DATE / HOLIDAY UTILITIES
   ============================================================ */
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function addDays(dt, n) {
  const r = new Date(dt);
  r.setDate(r.getDate() + n);
  return r;
}

function nthDayOfMonth(year, month, dow, n) {
  // nth occurrence of dow (0=Sun..6=Sat) in month (0-indexed)
  const first = new Date(year, month, 1);
  let d = (dow - first.getDay() + 7) % 7 + 1;
  d += (n - 1) * 7;
  return new Date(year, month, d);
}
function lastDayOfMonth(year, month, dow) {
  const last = new Date(year, month + 1, 0);
  let d = last.getDate() - ((last.getDay() - dow + 7) % 7);
  return new Date(year, month, d);
}

function observedDate(dt) {
  const dow = dt.getDay();
  if (dow === 6) return addDays(dt, -1); // Sat -> Fri
  if (dow === 0) return addDays(dt, 1);  // Sun -> Mon
  return dt;
}

function getFederalHolidays(year) {
  const raw = [
    new Date(year, 0, 1),                    // New Year
    nthDayOfMonth(year, 0, 1, 3),            // MLK (3rd Mon Jan)
    nthDayOfMonth(year, 1, 1, 3),            // Presidents (3rd Mon Feb)
    lastDayOfMonth(year, 4, 1),              // Memorial (last Mon May)
    new Date(year, 5, 19),                   // Juneteenth
    new Date(year, 6, 4),                    // Independence
    nthDayOfMonth(year, 8, 1, 1),            // Labor (1st Mon Sep)
    nthDayOfMonth(year, 9, 1, 2),            // Columbus (2nd Mon Oct)
    new Date(year, 10, 11),                  // Veterans
    nthDayOfMonth(year, 10, 4, 4),           // Thanksgiving (4th Thu Nov)
    new Date(year, 11, 25),                  // Christmas
  ];
  const holidays = new Set();
  raw.forEach(h => {
    const obs = observedDate(h);
    holidays.add(fmtDate(obs));
  });
  return holidays;
}

function getBridgeDays(holidaySet) {
  const bridges = new Set();
  holidaySet.forEach(ds => {
    const dt = parseDate(ds);
    const dow = dt.getDay();
    if (dow === 2) { // Tuesday -> Monday bridge
      bridges.add(fmtDate(addDays(dt, -1)));
    }
    if (dow === 4) { // Thursday -> Friday bridge
      bridges.add(fmtDate(addDays(dt, 1)));
    }
  });
  return bridges;
}

function buildHolidaySet(startDate, endDate, extraStr) {
  const s = parseDate(startDate);
  const e = parseDate(endDate);
  const years = new Set();
  for (let y = s.getFullYear(); y <= e.getFullYear(); y++) years.add(y);

  let allHolidays = new Set();
  years.forEach(y => {
    getFederalHolidays(y).forEach(h => allHolidays.add(h));
  });

  // Add extra holidays
  if (extraStr && extraStr.trim()) {
    extraStr.split(',').forEach(s => {
      const t = s.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(t)) allHolidays.add(t);
    });
  }

  // Bridge days
  const bridges = getBridgeDays(allHolidays);
  bridges.forEach(b => allHolidays.add(b));

  // Filter to range
  const result = new Set();
  allHolidays.forEach(h => {
    if (h >= startDate && h <= endDate) result.add(h);
  });
  return result;
}

/* ============================================================
   DAY CLASSIFICATION
   ============================================================ */
function classifyDay(dateStr, holidaySet) {
  if (holidaySet.has(dateStr)) return 'HOLIDAY';
  const dow = parseDate(dateStr).getDay();
  if (dow === 0 || dow === 6) return 'WEEKEND';
  return 'WEEKDAY';
}

function isHardDay(dateStr, holidaySet) {
  const cls = classifyDay(dateStr, holidaySet);
  return cls === 'WEEKEND' || cls === 'HOLIDAY';
}

/* ============================================================
   GREEDY SOLVER
   ============================================================ */
function solveSingleRole(directorates, dates, holidaySet, otherRoleAssignments) {
  const n = dates.length;
  const H = directorates.reduce((s, d) => s + d.eligible, 0);
  if (H === 0) return {};

  const hardDates = dates.filter(d => isHardDay(d, holidaySet));
  const softDates = dates.filter(d => !isHardDay(d, holidaySet));
  const nHard = hardDates.length;

  const dirs = directorates.map(d => {
    const share = d.eligible / H;
    const totalTarget = share * n;
    const hardTarget = share * nHard;
    return {
      name: d.name,
      eligible: d.eligible,
      totalTarget,
      hardTarget,
      remainQuota: Math.ceil(totalTarget),
      remainHard: hardTarget,
      assignedTotal: 0,
      assignedHard: 0,
      assignedSoft: 0,
    };
  });

  // Interleave hard and soft days for even distribution
  const interleaved = [];
  let hi = 0, si = 0;
  const hardRatio = nHard / n;
  for (let i = 0; i < n; i++) {
    const expectedHard = Math.round((i + 1) * hardRatio);
    if (hi < hardDates.length && (si >= softDates.length || hi < expectedHard)) {
      interleaved.push({ date: hardDates[hi], hard: true });
      hi++;
    } else if (si < softDates.length) {
      interleaved.push({ date: softDates[si], hard: false });
      si++;
    }
  }

  const assignments = {};
  let prevDir = null;

  for (const slot of interleaved) {
    const dateStr = slot.date;
    const hard = slot.hard;

    let candidates = dirs.filter(d => d.remainQuota > 0);
    if (candidates.length === 0) candidates = [...dirs];

    if (prevDir && candidates.length > 1) {
      candidates = candidates.filter(d => d.name !== prevDir);
    }

    if (otherRoleAssignments && otherRoleAssignments[dateStr] && candidates.length > 1) {
      const filtered = candidates.filter(d => d.name !== otherRoleAssignments[dateStr]);
      if (filtered.length > 0) candidates = filtered;
    }

    let best;
    if (hard) {
      best = candidates.reduce((a, b) => {
        const aGap = a.hardTarget - a.assignedHard;
        const bGap = b.hardTarget - b.assignedHard;
        if (bGap !== aGap) return bGap > aGap ? b : a;
        return (b.remainQuota > a.remainQuota) ? b : a;
      });
    } else {
      best = candidates.reduce((a, b) => {
        if (b.remainQuota !== a.remainQuota) return b.remainQuota > a.remainQuota ? b : a;
        return (b.totalTarget - b.assignedTotal) > (a.totalTarget - a.assignedTotal) ? b : a;
      });
    }

    assignments[dateStr] = best.name;
    best.remainQuota--;
    best.assignedTotal++;
    if (hard) {
      best.assignedHard++;
    } else {
      best.assignedSoft++;
    }
    prevDir = best.name;
  }

  const result = {};
  dates.forEach(d => { result[d] = assignments[d]; });
  return { assignments: result, stats: dirs };
}

async function solve(directoratesSDNCO, directoratesRunner, dates, holidaySet) {
  // Try ILP first
  const ilpResult = await solveILP(directoratesSDNCO, directoratesRunner, dates, holidaySet);
  if (ilpResult) return ilpResult;

  // Greedy fallback
  solverMethod = 'Greedy Fallback';
  const sdncoResult = solveSingleRole(directoratesSDNCO, dates, holidaySet, null);
  const runnerResult = solveSingleRole(directoratesRunner, dates, holidaySet, sdncoResult.assignments);
  return { sdnco: sdncoResult, runner: runnerResult };
}

/* ============================================================
   GINI COEFFICIENT
   ============================================================ */
function gini(values) {
  const n = values.length;
  const total = values.reduce((a, b) => a + b, 0);
  if (!n || !total) return 0;
  const sorted = [...values].sort((a, b) => a - b);
  let cumsum = 0;
  for (let i = 0; i < n; i++) {
    cumsum += (2 * (i + 1) - n - 1) * sorted[i];
  }
  return cumsum / (n * total);
}

/* ============================================================
   EXCEL EXPORT — HTML table .xls matching Fly.io Roster sheet
   Copy-paste friendly: matches the real workbook format
   ============================================================ */
function exportExcel() {
  if (!lastResult) {
    alert('No roster data. Generate a roster first.');
    return;
  }
  const { result, dirsSDNCO, dates, holidaySet, startDate, endDate } = lastResult;

  // Excel color palette for directorates (mapped 1:1 from DIR_COLORS indices)
  const EXCEL_DIR_COLORS = [
    '4472C4','ED7D31','A9D18E','FF0000','FFC000',
    '00B0F0','7030A0','92D050','FF6699','00B050',
    'BF8F00','9966FF','FF3399','00CED1','4338CA'
  ];

  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const SHORT_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build directorate -> color map from dirsSDNCO array indices
  const dirColorMap = {};
  dirsSDNCO.forEach((d, i) => {
    dirColorMap[d.name] = EXCEL_DIR_COLORS[i % EXCEL_DIR_COLORS.length];
  });

  // Format a date string as "01 Jul 2026"
  function fmtDateExcel(ds) {
    const dt = parseDate(ds);
    return `${String(dt.getDate()).padStart(2,'0')} ${SHORT_MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;
  }

  const sd = parseDate(startDate);
  const ed = parseDate(endDate);
  const titleStart = `${String(sd.getDate()).padStart(2,'0')} ${SHORT_MONTHS[sd.getMonth()]} ${sd.getFullYear()}`;
  const titleEnd = `${String(ed.getDate()).padStart(2,'0')} ${SHORT_MONTHS[ed.getMonth()]} ${ed.getFullYear()}`;

  let html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:spreadsheet">';
  html += '<head><meta charset="utf-8"><style>';
  html += 'td, th { mso-number-format:\\@; }';
  html += '</style></head><body>';
  html += '<table border="1" cellspacing="0" cellpadding="4">';

  // Row 1: merged title
  html += '<tr>';
  html += `<td colspan="7" style="background:#0C2340;color:#FFFFFF;font-weight:bold;font-size:14pt;text-align:center;">`;
  html += `ASCC HQ STAFF DUTY ROSTER  \u2014  ${titleStart} \u2013 ${titleEnd}`;
  html += '</td></tr>';

  // Row 2: column headers
  html += '<tr>';
  const headers = ['DATE','DAY','TYPE','SDNCO UNIT','SDNCO NAME','SD_Runner UNIT','SD_Runner NAME'];
  headers.forEach(h => {
    html += `<th style="background:#1F3864;color:#FFFFFF;font-weight:bold;font-size:10pt;">${h}</th>`;
  });
  html += '</tr>';

  // Data rows
  let prevMonth = -1;
  dates.forEach(ds => {
    const dt = parseDate(ds);
    const month = dt.getMonth();
    const cls = classifyDay(ds, holidaySet);
    const dayName = SHORT_DAYS[dt.getDay()];
    const dateLabel = fmtDateExcel(ds);
    const typeLabel = cls === 'WEEKDAY' ? 'Weekday' : cls === 'WEEKEND' ? 'Weekend' : 'Holiday';
    const sdncoDir = result.sdnco.assignments[ds];
    const runnerDir = result.runner.assignments[ds];

    const isFirstOfMonth = (month !== prevMonth);
    prevMonth = month;

    // Row background by day type
    let rowBg;
    if (cls === 'WEEKEND') { rowBg = '#DDEBF7'; }
    else if (cls === 'HOLIDAY') { rowBg = '#FCE4D6'; }
    else { rowBg = '#FFFFFF'; }

    const dateBold = isFirstOfMonth ? 'font-weight:bold;' : '';
    const sdncoColor = dirColorMap[sdncoDir] || 'FFFFFF';
    const runnerColor = dirColorMap[runnerDir] || 'FFFFFF';

    html += '<tr>';
    html += `<td style="background:${rowBg};${dateBold}">${dateLabel}</td>`;
    html += `<td style="background:${rowBg};">${dayName}</td>`;
    html += `<td style="background:${rowBg};">${typeLabel}</td>`;
    html += `<td style="background:#${sdncoColor};font-weight:bold;">${sdncoDir}</td>`;
    html += `<td style="background:${rowBg};"></td>`;
    html += `<td style="background:#${runnerColor};font-weight:bold;">${runnerDir}</td>`;
    html += `<td style="background:${rowBg};"></td>`;
    html += '</tr>';
  });

  html += '</table></body></html>';

  const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `staff_duty_${lastResult.startDate}_${lastResult.endDate}.xls`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================================
   GENERATE
   ============================================================ */
async function generate() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const sameCount = document.getElementById('sameCountToggle').checked;
  const extraHolidays = document.getElementById('extraHolidays').value;

  if (!startDate || !endDate || startDate > endDate) {
    alert('Please enter a valid date range.');
    return;
  }

  const rows = document.querySelectorAll('#dirBody tr');
  const dirsSDNCO = [];
  const dirsRunner = [];
  let valid = true;
  rows.forEach(tr => {
    const name = tr.querySelector('.dir-name').value.trim();
    const sdnco = parseInt(tr.querySelector('.dir-sdnco').value) || 0;
    let runner = sameCount ? sdnco : (parseInt(tr.querySelector('.dir-runner').value) || 0);
    if (!name || sdnco < 1 || runner < 1) { valid = false; return; }
    dirsSDNCO.push({ name, eligible: sdnco });
    dirsRunner.push({ name, eligible: runner });
  });

  if (!valid || dirsSDNCO.length === 0) {
    alert('Please fill in all directorate fields with valid values (minimum 1 eligible).');
    return;
  }

  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('active');

  // Use requestAnimationFrame + setTimeout to let the overlay render before async work
  await new Promise(r => setTimeout(r, 80));

  try {
    const dates = [];
    let cur = parseDate(startDate);
    const end = parseDate(endDate);
    while (cur <= end) {
      dates.push(fmtDate(cur));
      cur = addDays(cur, 1);
    }

    const holidaySet = buildHolidaySet(startDate, endDate, extraHolidays);
    const result = await solve(dirsSDNCO, dirsRunner, dates, holidaySet);

    // Store globally for Excel export
    lastResult = { result, dirsSDNCO, dirsRunner, dates, holidaySet, startDate, endDate };

    renderDashboard(result, dirsSDNCO, dirsRunner, dates, holidaySet, startDate, endDate);
  } catch (e) {
    alert('Error generating roster: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('active');
  }
}

  html += `<div class="section-hdr"><span class="section-badge">SUMMARY</span><span class="section-title">Directorate Summary by Role</span></div>`;

  // Summary tables
  html += `<div class="side2">`;
  html += renderSummaryTable('SDNCO Summary', result.sdnco, dirsSDNCO, nDays, dates, holidaySet, colorMap);
  html += renderSummaryTable('SD Runner Summary', result.runner, dirsRunner, nDays, dates, holidaySet, colorMap);
  html += `</div>`;

  // Section header: FAIRNESS
  html += `<div class="section-hdr"><span class="section-badge">FAIRNESS</span><span class="section-title">Equity Analysis</span></div>`;

  // Fairness report
  html += `<div class="side2">`;
  html += renderFairnessReport('SDNCO Fairness / Equity', result.sdnco, dirsSDNCO, nDays, dates, holidaySet, colorMap);
  html += renderFairnessReport('SD Runner Fairness / Equity', result.runner, dirsRunner, nDays, dates, holidaySet, colorMap);
  html += `</div>`;

  // Section header: ROSTER
  html += `<div class="section-hdr"><span class="section-badge">ROSTER</span><span class="section-title">Daily Duty Assignment</span></div>`;

  // Calendar
  html += renderCalendar(result, dates, holidaySet, colorMap);

  html += `</div>`; // close tab-roster

  // ===== ABOUT THE MODEL TAB (hidden by default) =====
  html += `<div id="tab-about" style="display:none">`;
  const acard = 'background:#fff;border:1px solid #dde3ea;border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06)';
  const ahdr = 'background:var(--navy);color:var(--gold);padding:10px 18px;font-weight:700;font-size:0.92rem;text-transform:uppercase;letter-spacing:1px';
  const abody = 'padding:20px 24px;font-size:0.88rem;color:#1e293b;line-height:1.7';
  const aeq = 'background:var(--navy);color:var(--gold);font-family:monospace;font-size:0.88rem;text-align:center;padding:14px 18px;border-radius:6px;letter-spacing:1px';
  const anote = 'font-size:0.82rem;color:#6b7a8d;margin-top:12px;font-style:italic';

  html += `<div class="section-hdr"><span class="section-badge">MODEL</span><span class="section-title">About the Solver</span></div>`;

  // Card 1: The Core Problem
  html += `<div style="${acard}"><div style="${ahdr}">The Core Problem</div>
  <div style="${abody}">
    <p style="margin-bottom:12px">Staff duty requires assigning one SDNCO and one SD Runner from the headquarters directorates every single day of the quarter &mdash; weekdays, weekends, and holidays.</p>
    <p style="margin-bottom:12px">The challenge: distribute this burden <strong>proportionally</strong>. A directorate with 10 eligible soldiers should pull roughly twice as many duties as one with 5 &mdash; including its fair share of weekends and holidays.</p>
    <p>Manual scheduling is tedious and tends to be unfair. This tool automates it using mathematical optimization.</p>
  </div></div>`;

  // Card 2: ILP
  html += `<div style="${acard}"><div style="${ahdr}">Integer Linear Programming (ILP)</div>
  <div style="${abody}">
    <p style="margin-bottom:12px">An ILP solver finds the mathematically <strong>optimal</strong> assignment &mdash; not just a good one, the <em>best possible</em> one given the constraints.</p>
    <p style="margin-bottom:12px">Think of it like this: instead of trying thousands of schedules by hand, the solver evaluates millions of possibilities in seconds using the <strong>HiGHS</strong> optimization engine (the same technology used in logistics, airline scheduling, and supply chain planning).</p>
    <p>The solver runs entirely in your browser via WebAssembly &mdash; <strong>no data leaves your machine</strong>.</p>
  </div></div>`;

  // Card 3: Decision Variables
  html += `<div style="${acard}"><div style="${ahdr}">Decision Variables</div>
  <div style="${abody}">
    <p style="margin-bottom:12px">For each directorate <em>d</em> and each day <em>t</em>:</p>
    <ul style="margin:0 0 12px 20px">
      <li style="margin-bottom:6px"><strong>x<sub>S</sub>[d,t]</strong> = 1 if directorate <em>d</em> is assigned SDNCO on day <em>t</em>, 0 otherwise</li>
      <li><strong>x<sub>R</sub>[d,t]</strong> = 1 if directorate <em>d</em> is assigned Runner on day <em>t</em>, 0 otherwise</li>
    </ul>
    <p style="margin-bottom:16px">For a 92-day quarter with 7 directorates, that's <strong>7 &times; 92 &times; 2 = 1,288</strong> binary decision variables.</p>
    <div style="${aeq}">x<sub>S</sub>[d,t] &isin; {0, 1} &nbsp;&nbsp;&nbsp; x<sub>R</sub>[d,t] &isin; {0, 1} &nbsp;&nbsp;&nbsp; &forall; d &isin; Directorates, t &isin; Days</div>
  </div></div>`;

  // Card 4: Hard Constraints
  html += `<div style="${acard}"><div style="${ahdr}">Hard Constraints (Must Be Satisfied)</div>
  <div style="padding:0">
    <table class="dtable"><thead><tr>
      <th>ID</th><th>Constraint</th><th>Formula</th><th>Purpose</th>
    </tr></thead><tbody>
      <tr><td><strong>C1</strong></td><td>Coverage</td><td style="font-family:monospace;font-size:0.85rem">&Sigma;<sub>d</sub> x[d,t] = 1 for each day t</td><td>Exactly one directorate per day per role</td></tr>
      <tr><td><strong>C2</strong></td><td>Quota Bounds</td><td style="font-family:monospace;font-size:0.85rem">floor(q<sub>d</sub>) &le; &Sigma;<sub>t</sub> x[d,t] &le; ceil(q<sub>d</sub>)</td><td>Total days proportional to eligible count</td></tr>
      <tr><td><strong>C4</strong></td><td>Cooldown</td><td style="font-family:monospace;font-size:0.85rem">x[d,t] + x[d,t+1] &le; 1</td><td>No back-to-back days for same directorate</td></tr>
    </tbody></table>
    <p style="${anote};padding:0 24px 16px">Where q<sub>d</sub> = (eligible<sub>d</sub> / total_eligible) &times; n_days</p>
  </div></div>`;

  // Card 5: Soft Constraints
  html += `<div style="${acard}"><div style="${ahdr}">Soft Constraints (Penalties in Objective)</div>
  <div style="padding:0">
    <table class="dtable"><thead><tr>
      <th>ID</th><th>Constraint</th><th style="text-align:center">Weight</th><th>Purpose</th>
    </tr></thead><tbody>
      <tr><td><strong>C3</strong></td><td>Hard-day equity</td><td style="text-align:center;font-weight:700;color:var(--navy)">1.0</td><td>Weekend/holiday duties proportional to eligible count</td></tr>
      <tr><td><strong>C5</strong></td><td>Monthly spread</td><td style="text-align:center;font-weight:700;color:var(--navy)">1.5</td><td>Even distribution across months</td></tr>
      <tr><td><strong>C5b</strong></td><td>Half-month spacing</td><td style="text-align:center;font-weight:700;color:var(--navy)">0.6</td><td>Even distribution within each month</td></tr>
      <tr><td><strong>C6</strong></td><td>Same-day overlap</td><td style="text-align:center;font-weight:700;color:var(--navy)">3.0</td><td>Different directorate for SDNCO and Runner on same day</td></tr>
    </tbody></table>
    <div style="padding:14px 24px 16px;${abody}">Soft constraints aren't absolute rules &mdash; the solver <em>minimizes</em> violations. The penalty weights control priorities. Same-day overlap (<strong>3.0</strong>) is penalized most heavily because having the same directorate fill both roles on one day is operationally undesirable.</div>
  </div></div>`;

  // Card 6: Objective Function
  html += `<div style="${acard}"><div style="${ahdr}">Objective Function</div>
  <div style="${abody}">
    <div style="${aeq};line-height:1.8;margin-bottom:16px">Minimize: &Sigma; (hard-day deviation) + 1.5 &times; &Sigma; (monthly spread)<br>+ 0.6 &times; &Sigma; (half-month deviation) + 3.0 &times; &Sigma; (same-day overlap)</div>
    <p>The solver minimizes the total weighted penalty. A perfect score of <strong>0</strong> means every directorate got exactly its proportional share of every type of day, evenly spread across months, with no same-day overlaps.</p>
  </div></div>`;

  // Card 7: Greedy Fallback
  html += `<div style="${acard}"><div style="${ahdr}">Greedy Fallback</div>
  <div style="${abody}">
    <p>If the ILP solver cannot find an optimal solution within 120 seconds (extremely unlikely for typical inputs), the tool falls back to a greedy heuristic that assigns days one at a time, respecting cooldown and overlap rules. The greedy approach produces proportionally fair results but cannot guarantee global optimality.</p>
  </div></div>`;

  // Card 8: Fairness Metrics
  html += `<div style="${acard}"><div style="${ahdr}">Fairness Metrics</div>
  <div style="${abody}">
    <p style="margin-bottom:12px">The <strong>Gini coefficient</strong> (0&ndash;1) measures inequality in the distribution:</p>
    <ul style="margin:0 0 12px 20px">
      <li style="margin-bottom:6px"><strong style="color:#166534">0.000</strong> = perfectly equal (every directorate got exactly its fair share)</li>
      <li style="margin-bottom:6px"><strong style="color:#854d0e">&le; 0.050</strong> = excellent (typical ILP result)</li>
      <li><strong style="color:#991b1b">&gt; 0.100</strong> = review needed (unusual &mdash; may indicate conflicting constraints)</li>
    </ul>
    <p>The dashboard reports two Gini values: one for total days, one for hard days (weekends + holidays).</p>
  </div></div>`;

  // Card 9: Technical Details
  html += `<div style="${acard}"><div style="${ahdr}">Technical Details</div>
  <div style="${abody}">
    <ul style="margin:0 0 0 20px">
      <li style="margin-bottom:8px"><strong>Solver</strong>: HiGHS 1.8.0 (WASM), same engine used by SciPy, Google OR-Tools, and Julia JuMP</li>
      <li style="margin-bottom:8px"><strong>Problem class</strong>: Mixed-Integer Linear Program (MILP)</li>
      <li style="margin-bottom:8px"><strong>Time limit</strong>: 120 seconds (typical solve: &lt;5 seconds)</li>
      <li style="margin-bottom:8px"><strong>Variables</strong>: ~2n &times; d binary + ~8d continuous (n = days, d = directorates)</li>
      <li style="margin-bottom:8px"><strong>Constraints</strong>: ~2n + 6d + 2nd + monthly/half-monthly terms</li>
      <li style="margin-bottom:8px"><strong>Execution</strong>: 100% client-side &mdash; no server, no network requests, no data exfiltration</li>
      <li><strong>Holiday source</strong>: US federal holidays (algorithmic) + USAREUR-AF bridge-day heuristic + user-supplied DONSAs</li>
    </ul>
  </div></div>`;

  html += `</div>`; // close tab-about

  html += `</div>`; // dash-container

  // Footer
  html += `<div class="dash-footer">
    <p class="footer-line footer-title">HEADQUARTERS, UNITED STATES ARMY EUROPE AND AFRICA</p>
    <p class="footer-line">HHBn STAFF DUTY ROSTER &middot; SDNCO &amp; SD RUNNER &middot; ${qLabel}</p>
    <p class="footer-line">${solverMethod.toUpperCase()} PROPORTIONAL FAIRNESS SOLVER &middot; USAREUR-AF OPERATIONAL DATA TEAM</p>
    <p class="footer-line">GENERATED: ${genDate} &middot; UNCLASSIFIED</p>
  </div>`;

  html += `<div class="unclas-banner">UNCLASSIFIED</div>`;

  dash.innerHTML = html;
}

function renderSummaryTable(title, roleResult, dirs, nDays, dates, holidaySet, colorMap) {
  const stats = roleResult.stats;
  const assignments = roleResult.assignments;
  const H = dirs.reduce((s, d) => s + d.eligible, 0);
  const maxAssigned = Math.max(...stats.map(s => s.assignedTotal), 1);

  let html = `<div><div class="dtable-wrap"><div class="dtable-hdr">${title} <span style="float:right;font-size:0.75rem;letter-spacing:1px;opacity:0.8">${solverMethod.toUpperCase()}</span></div>`;
  html += `<table class="dtable"><thead><tr>
    <th>Directorate</th><th>Eligible</th><th>Target</th><th>Actual Days</th><th>Weekday</th><th>Weekend</th><th>Holiday</th><th>Hard Days</th>
  </tr></thead><tbody>`;

  stats.forEach(s => {
    const target = (s.totalTarget).toFixed(1);
    const pct = Math.round((s.assignedTotal / maxAssigned) * 100);
    const color = colorMap[s.name] || '666';

    let wkend = 0, hol = 0;
    dates.forEach(d => {
      if (assignments[d] === s.name) {
        const cls = classifyDay(d, holidaySet);
        if (cls === 'WEEKEND') wkend++;
        if (cls === 'HOLIDAY') hol++;
      }
    });

    html += `<tr>
      <td><span class="chip" style="background:#${color}">${s.name}</span></td>
      <td>${s.eligible}</td>
      <td>${target}</td>
      <td><div class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:#${color}"></div></div><span class="bar-val">${s.assignedTotal}</span></div></td>
      <td>${s.assignedSoft}</td>
      <td>${wkend}</td>
      <td>${hol}</td>
      <td>${s.assignedHard}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  return html;
}

function renderFairnessReport(title, roleResult, dirs, nDays, dates, holidaySet, colorMap) {
  const stats = roleResult.stats;
  const H = dirs.reduce((s, d) => s + d.eligible, 0);
  const nHard = dates.filter(d => isHardDay(d, holidaySet)).length;

  let maxDev = 0;
  let maxHardDev = 0;
  const rows = stats.map(s => {
    const fairTotal = (s.eligible / H) * nDays;
    const fairHard = (s.eligible / H) * nHard;
    const devTotal = Math.abs(s.assignedTotal - fairTotal);
    const devHard = Math.abs(s.assignedHard - fairHard);
    if (devTotal > maxDev) maxDev = devTotal;
    if (devHard > maxHardDev) maxHardDev = devHard;
    return { ...s, fairTotal, fairHard, devTotal, devHard };
  });

  let verdictClass, verdictText;
  if (maxDev <= 1.0 && maxHardDev <= 1.0) {
    verdictClass = 'verdict-green';
    verdictText = 'EXCELLENT — All directorates within &plusmn;1 day of proportional target.';
  } else if (maxDev <= 2.0 && maxHardDev <= 2.0) {
    verdictClass = 'verdict-yellow';
    verdictText = 'ACCEPTABLE — Assignments within &plusmn;2 days of target. Minor variance due to constraints.';
  } else {
    verdictClass = 'verdict-red';
    verdictText = 'REVIEW NEEDED — Some directorates deviate more than &plusmn;2 days from target.';
  }

  const giniVal = gini(rows.map(r => r.assignedTotal));

  let html = `<div><div class="dtable-wrap"><div class="dtable-hdr">${title}</div><div style="padding:16px;">`;
  html += `<div class="verdict-banner ${verdictClass}">${verdictText}</div>`;
  html += `<p style="font-size:0.85rem;color:#475569;margin-bottom:12px;">Proportional fairness ensures each directorate's duty count matches its share of eligible soldiers.</p>`;

  html += `<table class="dtable"><thead><tr>
    <th>Directorate</th><th>Eligible</th><th>Fair Share Total</th><th>Actual Total</th><th>Fair Share Hard</th><th>Actual Hard</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const totalPill = pillFor(r.assignedTotal, r.fairTotal);
    const hardPill = pillFor(r.assignedHard, r.fairHard);
    html += `<tr>
      <td><span class="chip" style="background:#${colorMap[r.name] || '666'}">${r.name}</span></td>
      <td>${r.eligible}</td>
      <td>${r.fairTotal.toFixed(1)}</td>
      <td>${totalPill}</td>
      <td>${r.fairHard.toFixed(1)}</td>
      <td>${hardPill}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  html += `<div class="gini-note">Gini coefficient: ${giniVal.toFixed(4)} (0 = perfect equality, 1 = maximum inequality)</div>`;
  html += `</div></div></div>`;
  return html;
}

function pillFor(actual, target) {
  const dev = actual - target;
  const absDev = Math.abs(dev);
  let cls = 'pill-green';
  if (absDev > 2) cls = 'pill-red';
  else if (absDev > 1) cls = 'pill-yellow';

  let label;
  if (absDev < 0.5) {
    label = `${actual} days — On target`;
  } else {
    const sign = dev > 0 ? '+' : '-';
    label = `${actual} days — ${sign}${Math.round(absDev)} over`;
  }

  return `<span class="pill ${cls}">${label}</span>`;
}

function renderCalendar(result, dates, holidaySet, colorMap) {
  let html = `<div class="dtable-wrap"><div class="dtable-hdr">Daily Roster Calendar</div>`;
  html += `<div class="cal-table-wrap"><table class="dtable"><thead><tr>
    <th>Date</th><th>Day</th><th>Type</th><th>SDNCO</th><th>SD Runner</th>
  </tr></thead><tbody>`;

  let prevMonth = -1;
  dates.forEach(ds => {
    const dt = parseDate(ds);
    const month = dt.getMonth();
    if (month !== prevMonth) {
      prevMonth = month;
      html += `<tr class="cal-month-divider"><td colspan="5">${MONTH_NAMES[month]} ${dt.getFullYear()}</td></tr>`;
    }

    const cls = classifyDay(ds, holidaySet);
    let rowClass = '';
    if (cls === 'WEEKEND') rowClass = 'cal-row-weekend';
    if (cls === 'HOLIDAY') rowClass = 'cal-row-holiday';

    const dayName = DAY_NAMES[dt.getDay()];
    let badge = '<span class="badge-weekday">Weekday</span>';
    if (cls === 'WEEKEND') badge = '<span class="badge-weekend">Weekend</span>';
    if (cls === 'HOLIDAY') badge = '<span class="badge-holiday">Holiday</span>';

    const sdncoDir = result.sdnco.assignments[ds];
    const runnerDir = result.runner.assignments[ds];
    const sdncoChip = `<span class="chip" style="background:#${colorMap[sdncoDir] || '666'}">${sdncoDir}</span>`;
    const runnerChip = `<span class="chip" style="background:#${colorMap[runnerDir] || '666'}">${runnerDir}</span>`;

    html += `<tr class="${rowClass}">
      <td class="cal-date-cell">${ds}</td><td class="cal-day-cell">${dayName}</td><td>${badge}</td><td>${sdncoChip}</td><td>${runnerChip}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  return html;
}
