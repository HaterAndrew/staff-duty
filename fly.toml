app = 'usareur-staff-duty'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Concurrency caps are tight on purpose. Gunicorn runs 2 workers (see
# Dockerfile) and the ILP solver can take up to 120s per /generate,
# /export/excel, /resolve, or /whatif request. With `hard_limit = 25` a
# burst would queue 23 requests behind 2 in-flight solves — guaranteed
# head-of-line blocking and exhausted 150s gunicorn timeouts. A smaller
# cap gives Fly's edge an earlier signal to shed load to a cold machine
# (auto_start_machines = true) instead of piling onto a saturated one.
[http_service.concurrency]
  type = "requests"
  hard_limit = 10
  soft_limit = 6

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  port = 8080
  timeout = "5s"

[mounts]
  source = "staff_duty_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
